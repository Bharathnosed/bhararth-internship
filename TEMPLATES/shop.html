<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Storefront</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        .product-card img { max-width: 100%; height: auto; margin-bottom: 10px; border-radius: 4px; }
        .product-price { font-size: 18px; font-weight: bold; color: var(--primary-color); margin: 10px 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="navbar">
            <h2>Storefront</h2>
            <div>
                <a href="/cart" style="margin-right: 15px; font-weight: bold; color: #fd7e14; text-decoration: none;">🛒 View Cart</a>
                <a href="/profile" style="color: #666; text-decoration: none;">Back to Profile</a>
            </div>
        </div>

        <p style="text-align: center; color: #666;">Browsing as: <strong>{{ username }}</strong></p>

        <div class="product-grid" id="productGrid">
            </div>
    </div>

    <script>
        // Trigger fetch immediately on page load
        document.addEventListener("DOMContentLoaded", loadProducts);

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/login';
                    return;
                }
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error("Error loading products:", error);
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image_url}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p style="font-size: 14px; color: #666; height: 40px; overflow: hidden;">${product.description}</p>
                    <div class="product-price">₹${product.price.toFixed(2)}</div>
                    <button onclick="addToCart(${product.id})" style="width: 100%; background-color: #007bff;">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }

        async function addToCart(productId) {
            try {
                const response = await fetch('/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: productId })
                });

                if (response.ok) {
                    alert("Item added to your cart.");
                } else {
                    alert("Failed to add item to cart.");
                }
            } catch (error) {
                console.error("Error adding to cart:", error);
            }
        }
    </script>
</body>
</html>
