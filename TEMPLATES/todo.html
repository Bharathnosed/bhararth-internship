<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Specific styles for the to-do list structure */
        .task-list { list-style: none; padding: 0; margin-top: 20px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border-color); }
        .completed span { text-decoration: line-through; color: gray; }
        .task-actions { display: flex; gap: 5px; }
        .task-actions button { padding: 6px 12px; font-size: 14px; margin: 0; }
        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #c82333; }
        .add-task-container { display: flex; gap: 10px; margin-top: 15px; }
        .add-task-container input { flex-grow: 1; margin: 0; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h2>{{ username }}'s Tasks</h2>
        
        <div class="add-task-container">
            <input type="text" id="newTaskInput" placeholder="Enter a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>

        <ul class="task-list" id="taskList">
            </ul>

        <p class="link-text">
            <a href="/profile">Back to Profile</a>
        </p>
    </div>

    <script>
        // 1. READ: Trigger loadTasks the second the page finishes loading
        document.addEventListener("DOMContentLoaded", loadTasks);

        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/login';
                    return;
                }
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                console.error("Error loading tasks:", error);
            }
        }

        // 2. DRAW: This function takes the JSON data and builds HTML elements
        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = ''; // Clear current list to prevent duplicates

            tasks.forEach(task => {
                const li = document.createElement('li');
                // If is_completed is true, attach the 'completed' CSS class
                li.className = `task-item ${task.is_completed ? 'completed' : ''}`;
                
                // Inject the HTML for this specific task
                li.innerHTML = `
                    <span>${task.task_name}</span>
                    <div class="task-actions">
                        <button onclick="toggleTask(${task.id}, ${!task.is_completed})">
                            ${task.is_completed ? 'Undo' : 'Complete'}
                        </button>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // 3. CREATE: Send a new task to the server
        async function addTask() {
            const input = document.getElementById('newTaskInput');
            const taskName = input.value.trim();
            if (!taskName) return; // Don't allow empty tasks

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_name: taskName })
                });

                if (response.ok) {
                    input.value = ''; // Clear the input box
                    loadTasks();      // Refresh the list to show the new task
                }
            } catch (error) {
                console.error("Error adding task:", error);
            }
        }

        // 4. UPDATE: Change completion status
        async function toggleTask(id, newStatus) {
            try {
                const response = await fetch(`/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_completed: newStatus })
                });

                if (response.ok) loadTasks(); // Refresh to show strike-through
            } catch (error) {
                console.error("Error updating task:", error);
            }
        }

        // 5. DELETE: Remove task completely
        async function deleteTask(id) {
            try {
                const response = await fetch(`/api/tasks/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) loadTasks(); // Refresh to remove the item from the screen
            } catch (error) {
                console.error("Error deleting task:", error);
            }
        }
    </script>
</body>
</html>
