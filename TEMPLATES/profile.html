<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="text-align: center; max-width: 450px;">
    <h2>Welcome, {{ username }}!</h2>
    <div style="margin-bottom: 10px;"><a href="/todo" style="display: block; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">To-Do List</a></div>
    <div style="margin-bottom: 10px;"><a href="/blog" style="display: block; padding: 12px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Global Blog Feed</a></div>
    <div style="margin-bottom: 10px;"><a href="/shop" style="display: block; padding: 12px; background: #fd7e14; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Product Storefront</a></div>
    <div style="margin-bottom: 10px;"><a href="/orders" style="display: block; padding: 12px; background: #17a2b8; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Order History</a></div>
    <div style="margin-bottom: 10px;"><a href="/chat" style="display: block; padding: 12px; background: #6f42c1; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Enter Global Chat</a></div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <a href="/quiz" style="flex: 1; padding: 12px; background: #e83e8c; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Take Quiz</a>
        <a href="/admin/quiz" style="flex: 1; padding: 12px; background: #343a40; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">+ Add Question</a>
    </div>

    <div style="background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin-bottom: 20px; text-align: left;">
        <h4 style="margin-top: 0;">My Quiz Scores</h4>
        <ul id="scoreList" style="padding-left: 20px; margin-bottom: 0; font-size: 14px;">Loading...</ul>
    </div>

    <button onclick="fetch('/api/logout', {method: 'POST'}).then(() => window.location.href='/login')" style="background: #dc3545; width: 100%;">Logout</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const res = await fetch('/api/scores');
        if (res.ok) {
            const scores = await res.json();
            const list = document.getElementById('scoreList');
            if (scores.length === 0) {
                list.innerHTML = "<li>No quizzes taken yet.</li>";
            } else {
                list.innerHTML = scores.map(s => `<li>Scored ${s.score}/${s.total} on ${new Date(s.created_at).toLocaleDateString()}</li>`).join('');
            }
        }
    });
</script>
</body>
</html>
