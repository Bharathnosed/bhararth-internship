<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="text-align: center; max-width: 450px;">
    <h2>Welcome, {{ username }}!</h2>
    <div style="margin-bottom: 15px;"><a href="/todo" style="display: block; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">To-Do List</a></div>
    <div style="margin-bottom: 15px;"><a href="/blog" style="display: block; padding: 12px; background: #28a745; color: white; text-decoration: none; border-radius: 4px;">Blog Feed</a></div>
    <div style="margin-bottom: 15px;"><a href="/shop" style="display: block; padding: 12px; background: #fd7e14; color: white; text-decoration: none; border-radius: 4px;">Product Storefront</a></div>
    <div style="margin-bottom: 25px;"><a href="/orders" style="display: block; padding: 12px; background: #17a2b8; color: white; text-decoration: none; border-radius: 4px;">Order History</a></div>
    <button onclick="fetch('/api/logout', {method: 'POST'}).then(() => window.location.href='/login')" style="background: #dc3545; width: 100%;">Logout</button>
</div>
</body>
</html>
