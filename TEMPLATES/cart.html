<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); }
        .cart-details { flex-grow: 1; }
        .checkout-section { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px; border: 1px solid var(--border-color); }
        .total-price { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: var(--primary-color); }
        textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; resize: vertical; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Your Shopping Cart</h2>
            <a href="/shop" style="color: #007bff; text-decoration: none; font-weight: bold;">← Back to Shop</a>
        </div>

        <div id="cartItems"></div>

        <div class="checkout-section" id="checkoutSection" style="display: none;">
            <div class="total-price" id="cartTotal">Total: ₹0.00</div>
            <h3>Checkout</h3>
            <textarea id="shippingAddress" rows="3" placeholder="Enter your full shipping address here..." required></textarea>
            <button onclick="processCheckout()" style="width: 100%; background-color: #28a745; font-size: 16px;">Place Order</button>
        </div>

        <div id="emptyMessage" style="text-align: center; color: #666; margin-top: 20px;">
            Your cart is completely empty. Go add some items.
        </div>
    </div>

    <script>
        // Load the cart the moment the page opens
        document.addEventListener("DOMContentLoaded", loadCart);

        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/login';
                    return;
                }
                const items = await response.json();
                renderCart(items);
            } catch (error) {
                console.error("Error loading cart:", error);
            }
        }

        function renderCart(items) {
            const container = document.getElementById('cartItems');
            const checkoutSection = document.getElementById('checkoutSection');
            const emptyMessage = document.getElementById('emptyMessage');
            
            container.innerHTML = '';
            let total = 0;

            // If empty, hide the checkout form
            if (items.length === 0) {
                checkoutSection.style.display = 'none';
                emptyMessage.style.display = 'block';
                return;
            }

            // If full, show the checkout form
            checkoutSection.style.display = 'block';
            emptyMessage.style.display = 'none';

            items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-details">
                        <h4 style="margin: 0 0 5px 0;">${item.name}</h4>
                        <div style="color: #666; font-size: 14px;">₹${item.price.toFixed(2)} x ${item.quantity}</div>
                    </div>
                    <div style="font-weight: bold; margin-right: 15px;">₹${itemTotal.toFixed(2)}</div>
                    <button onclick="removeFromCart(${item.cart_id})" style="background-color: #dc3545; padding: 6px 12px; margin: 0; font-size: 14px;">Remove</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('cartTotal').innerText = `Total: ₹${total.toFixed(2)}`;
        }

        async function removeFromCart(cartId) {
            try {
                const response = await fetch(`/api/cart/${cartId}`, { method: 'DELETE' });
                if (response.ok) loadCart(); // Refresh the list
            } catch (error) {
                console.error("Error removing item:", error);
            }
        }

        async function processCheckout() {
            const address = document.getElementById('shippingAddress').value.trim();
            if (!address) {
                alert("You cannot order without a shipping address.");
                return;
            }

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shipping_address: address })
                });

                const data = await response.json();

                if (response.ok) {
                    // Alert the user of their specific Order ID from the database
                    alert("Success! Your order has been placed. Order ID: " + data.order_id);
                    window.location.href = '/shop'; // Kick them back to the storefront
                } else {
                    alert(data.error || "Checkout failed");
                }
            } catch (error) {
                console.error("Error during checkout:", error);
            }
        }
    </script>
</body>
</html>
